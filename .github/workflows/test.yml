name: Continuous Integration
on:
  schedule:
    # Weekly on Mondays for Windows / Mac
    - cron: '0 15 * * 1'
      timezone: 'America/Vancouver'
    # Nightly builds for Linux (cheapest)
    - cron: '0 15 * * *'
      timezone: 'America/Vancouver'
  pull_request:
  push:
    branches:
      - master
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'schedule' || (github.event.schedule == '0 15 * * 1' && matrix.os != 'ubuntu-latest') || (github.event.schedule == '0 15 * * *' && matrix.os == 'ubuntu-latest')
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
    - run: npm install
    - run: npm run build
    - run: xvfb-run -a npm test
      if: runner.os == 'Linux'
    - run: npm test
      if: runner.os != 'Linux'
